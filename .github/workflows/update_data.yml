name: Update Library Events Data

on:
  schedule:
    # 7am ET = noon UTC (accounts for EST; during EDT this runs at 8am ET)
    - cron: "0 12 * * *"
  workflow_dispatch: # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: pipeline
        run: uv sync

      - name: Run fetch script and log errors
        id: fetch_step
        working-directory: pipeline
        run: |
          # Run the script and pipe errors to a log file while still printing them to the console
          if ! uv run fetch_events.py 2> error.log; then
            echo "::error::Fetch script failed. Check error.log for details."
            cat error.log
            exit 1
          fi

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/meta.json
          
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update library events data [skip ci]"
            git push
          fi

      - name: Upload error log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: python-error-log
          path: pipeline/error.log
          retention-days: 7