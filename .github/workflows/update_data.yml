name: Update Library Events Data

on:
  schedule:
    # 7am ET = noon UTC (accounts for EST; during EDT this runs at 8am ET)
    - cron: "0 12 * * *"
  workflow_dispatch:
    # Allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        working-directory: pipeline
        run: uv sync

      - name: Run fetch script
        working-directory: pipeline
        run: uv run fetch_events.py

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json data/meta.json
          # Only commit if there are staged changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update library events data [skip ci]"
            git push
          fi